# Продакшен на komsync.ru: nginx на :80, Postgres на хосте Ubuntu.
# Backend в host-сети → 127.0.0.1:5432 (без pg_hba для Docker).
# Скопируйте .env.example в .env перед запуском.
#
# На сервере:
#   cd /root/komSync && git pull
#   docker compose down --remove-orphans
#   docker compose build --no-cache
#   docker compose up -d
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: komsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
      - backend
    networks:
      - komsync

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: komsync-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - komsync

  backend:
    build:
      context: ./backend
      dockerfile: ./WebApi/Dockerfile
    container_name: komsync-backend
    restart: unless-stopped
    network_mode: host
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "${BACKEND_PORT:-5237}"
      ASPNETCORE_URLS: "http://+:${BACKEND_PORT:-5237}"
      App__UseHttpsRedirection: "false"
      Cors__IncludeBackendOrigin: "false"
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS:-http://komsync.ru,http://www.komsync.ru,http://72.56.234.114}
      ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-komSync};Username=${POSTGRES_USER:-komsync};Password=${POSTGRES_PASSWORD:-komsync}
      JwtSettings__Secret: ${JWT_SECRET:-SUPER_SECRET_KEY_KOM_SYNC_ZATWAY_2026}
      PasswordReset__FrontendBaseUrl: ${PASSWORD_RESET_FRONTEND_BASE_URL:-http://komsync.ru}
      PasswordReset__TokenLifetimeHours: ${PASSWORD_RESET_TOKEN_LIFETIME_HOURS:-24}
      DeadlineReminders__Enabled: ${DEADLINE_REMINDERS_ENABLED:-true}
      DeadlineReminders__IntervalHours: ${DEADLINE_REMINDERS_INTERVAL_HOURS:-1}
      DeadlineReminders__OffsetsDays__0: ${DEADLINE_REMINDERS_OFFSET_0:-7}
      DeadlineReminders__OffsetsDays__1: ${DEADLINE_REMINDERS_OFFSET_1:-3}
      DeadlineReminders__OffsetsDays__2: ${DEADLINE_REMINDERS_OFFSET_2:-1}
      DeadlineReminders__OffsetsDays__3: ${DEADLINE_REMINDERS_OFFSET_3:-0}
      SmtpEmail__Enabled: ${SMTP_ENABLED:-true}
      SmtpEmail__Host: ${SMTP_HOST:-smtp.gmail.com}
      SmtpEmail__Port: ${SMTP_PORT:-587}
      SmtpEmail__UseSsl: ${SMTP_USE_SSL:-true}
      SmtpEmail__Username: ${SMTP_USERNAME:-arslanbekovr7@gmail.com}
      SmtpEmail__Password: ${SMTP_PASSWORD:-lyrspwhiysesigse}
      SmtpEmail__FromEmail: ${SMTP_FROM_EMAIL:-arslanbekovr7@gmail.com}
      SmtpEmail__FromName: ${SMTP_FROM_NAME:-komSync}
      SmtpEmail__TimeoutSeconds: ${SMTP_TIMEOUT_SECONDS:-20}
      SeedAdmin__Enabled: ${SEED_ADMIN_ENABLED:-false}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-admin@komsync.local}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-Admin123!}
      SeedAdmin__FullName: ${SEED_ADMIN_FULLNAME:-System Admin}
      SeedAdmin__DepartmentName: ${SEED_ADMIN_DEPARTMENT:-Admin}
      SeedAdmin__PositionName: ${SEED_ADMIN_POSITION:-Admin}

networks:
  komsync:
    name: komsync
